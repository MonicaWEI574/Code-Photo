<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas 长图自动化截图工具 - 全屏沉浸版</title>
    <!-- 使用 Tailwind CSS 进行轻量级快速布局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Ace Editor 提供代码语法高亮 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 全局及布局样式 */
        body { margin: 0; padding: 0; overflow: hidden; background-color: #e5e5e5; font-family: system-ui, -apple-system, sans-serif; }
        
        /* 顶部工具栏高度 */
        .toolbar { height: 50px; }
        
        /* 全屏预览容器：严格按照要求设置 */
        .preview-container {
            width: 100vw;
            height: calc(100vh - 50px);
            overflow: hidden; /* 改为 hidden，交由内部无限画布接管 */
            position: relative;
        }
        
        /* iframe 占据 100% 但允许内容撑开 */
        iframe { border: none; width: 100%; height: 100%; display: block; }

        /* 代码编辑器悬浮抽屉 */
        .code-drawer {
            position: fixed;
            top: 50px;
            left: 0;
            bottom: 0;
            width: 450px;
            max-width: 90vw;
            background: #fff;
            box-shadow: 4px 0 24px rgba(0,0,0,0.1);
            transform: translateX(0);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 40;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e5e7eb;
        }
        .code-drawer.collapsed {
            transform: translateX(-100%);
        }
        
        #code-editor { flex: 1; width: 100%; height: 100%; position: relative; }

        /* Ace Editor 空状态下的 Placeholder 样式 */
        #code-editor.ace_empty::before {
            content: "👉 请在此处粘贴您的长图代码（支持 React / HTML）\n\n【全流程操作指引】\n1. 粘贴代码：粘贴完毕后，右侧画板将自动全景渲染\n2. 格式整理：若代码杂乱，可点击上方「格式化」按钮整理\n3. 一键清空：点击「清空」按钮可重置输入区\n4. 导出长图：渲染成功后，点击右上角「生成截图」自动保存高清长图";
            position: absolute;
            top: 15px;
            left: 50px; /* 避开行号区域 */
            color: #94a3b8;
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-wrap;
            pointer-events: none;
            z-index: 10;
            font-family: system-ui, sans-serif;
        }

        /* 加载动画样式 */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 自定义滚动条更贴近 PS 风格 */
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-left: 1px solid #ddd; border-top: 1px solid #ddd; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 6px; border: 2px solid #f1f1f1; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="text-gray-800 antialiased flex flex-col h-screen">

    <!-- 顶部极简工具栏 (约 50px 高度) -->
    <header class="toolbar bg-white border-b border-gray-200 px-4 flex items-center justify-between shrink-0 shadow-sm z-50 relative">
        <div class="flex items-center gap-4">
            <!-- 切换代码编辑器的开关 -->
            <button id="btn-toggle-drawer" class="px-3 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded transition-colors flex items-center gap-2 text-sm font-medium border border-blue-200" title="打开/收起代码面板">
                <i data-lucide="panel-left-close" id="drawer-icon" class="w-4 h-4"></i>
                <span>代码面板</span>
            </button>
            <div class="w-px h-5 bg-gray-300 mx-1"></div>
            <!-- 状态指示器 -->
            <span id="status-badge" class="px-2.5 py-1 rounded text-xs font-medium bg-blue-50 text-blue-700 border border-blue-200 transition-colors whitespace-nowrap flex items-center gap-1">
                等待输入代码
            </span>
            <div class="w-px h-4 bg-gray-300 mx-1 hidden sm:block"></div>
            <!-- UI 操作提示 -->
            <span class="text-xs text-gray-500 hidden sm:flex items-center gap-1.5 px-2 py-0.5 rounded bg-gray-50 border border-gray-200" title="在右侧预览区按住鼠标左键即可拖动，使用滚轮放大或缩小">
                <i data-lucide="mouse-pointer-2" class="w-3.5 h-3.5"></i>
                拖拽平移 · 滚轮缩放
            </span>
        </div>

        <div class="flex items-center gap-2">
            <button id="btn-format" class="px-3 py-1.5 text-xs text-gray-600 bg-transparent rounded hover:bg-gray-100 transition-colors flex items-center gap-1" title="格式化代码">
                <i data-lucide="align-left" class="w-4 h-4"></i> <span class="hidden sm:inline">格式化</span>
            </button>
            <button id="btn-clear" class="px-3 py-1.5 text-xs text-red-600 bg-transparent rounded hover:bg-red-50 transition-colors flex items-center gap-1" title="清空代码">
                <i data-lucide="trash-2" class="w-4 h-4"></i> <span class="hidden sm:inline">清空</span>
            </button>
            <div class="w-px h-5 bg-gray-300 mx-2"></div>
            <!-- 核心保存按钮 -->
            <button id="btn-capture" class="px-5 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded shadow-sm transition-all flex items-center gap-2 transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                <i data-lucide="camera" class="w-4 h-4"></i>
                生成截图
            </button>
        </div>
    </header>

    <!-- 悬浮代码编辑器抽屉 (默认展开) -->
    <aside id="code-drawer" class="code-drawer">
        <div class="bg-gray-50 px-3 py-2 text-xs font-semibold text-gray-500 border-b flex justify-between items-center">
            <span>HTML / CSS / JS 输入区</span>
            <button id="btn-close-drawer-inner" class="text-gray-400 hover:text-gray-700 p-1 rounded-sm hover:bg-gray-200 transition">
                <i data-lucide="x" class="w-3.5 h-3.5"></i>
            </button>
        </div>
        <div id="code-editor" class="ace_empty"></div>
    </aside>

    <!-- 下方 100% 占满的超大预览画布区域 -->
    <main class="preview-container" id="preview-scroll-area">
        <!-- 沙箱 iframe -->
        <iframe id="render-frame" sandbox="allow-scripts allow-same-origin"></iframe>
        
        <!-- 截图过程中的全屏遮罩层 -->
        <div id="capture-overlay" class="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col justify-center items-center z-50 hidden transition-opacity" style="position: fixed;">
            <div class="loader mb-4"></div>
            <p class="text-gray-800 font-bold text-lg tracking-wide">正在捕获超宽/长图，请勿刷新...</p>
            <p class="text-sm text-gray-600 mt-2 bg-white px-4 py-2 rounded-full shadow-sm border">这可能需要几秒钟时间</p>
        </div>
    </main>

    <script>
        // 初始化图标
        lucide.createIcons();

        // DOM 元素引用
        const editorDiv = document.getElementById('code-editor');
        const renderFrame = document.getElementById('render-frame');
        const statusBadge = document.getElementById('status-badge');
        const btnCapture = document.getElementById('btn-capture');
        const captureOverlay = document.getElementById('capture-overlay');
        const codeDrawer = document.getElementById('code-drawer');
        const btnToggleDrawer = document.getElementById('btn-toggle-drawer');
        const btnCloseDrawerInner = document.getElementById('btn-close-drawer-inner');
        const drawerIcon = document.getElementById('drawer-icon');

        // 抽屉开关逻辑
        let isDrawerOpen = true;
        function toggleDrawer() {
            isDrawerOpen = !isDrawerOpen;
            if (isDrawerOpen) {
                codeDrawer.classList.remove('collapsed');
                drawerIcon.setAttribute('data-lucide', 'panel-left-close');
                btnToggleDrawer.classList.replace('bg-transparent', 'bg-blue-50');
            } else {
                codeDrawer.classList.add('collapsed');
                drawerIcon.setAttribute('data-lucide', 'panel-left-open');
                btnToggleDrawer.classList.replace('bg-blue-50', 'bg-transparent');
            }
            lucide.createIcons();
        }
        btnToggleDrawer.addEventListener('click', toggleDrawer);
        btnCloseDrawerInner.addEventListener('click', toggleDrawer);

        // ==========================================
        // 1. 初始化代码编辑器 (Ace Editor)
        // ==========================================
        const editor = ace.edit(editorDiv);
        editor.setTheme("ace/theme/chrome");
        editor.session.setMode("ace/mode/jsx"); // 修改为 JSX 模式以支持 React 语法高亮
        editor.setOptions({
            fontSize: "14px",
            showPrintMargin: false,
            wrap: true,
            useWorker: false
        });

        // 初始化为空代码，以显示 Placeholder 并保护隐私
        editor.setValue('', -1);

        // 监听输入以切换 Placeholder 显示状态
        editor.on("input", function() {
            if (editor.getValue().trim() === "") {
                editorDiv.classList.add("ace_empty");
            } else {
                editorDiv.classList.remove("ace_empty");
            }
        });

        // ==========================================
        // 2. 实时渲染与 Iframe 通信逻辑
        // ==========================================
        let renderTimeout;

        function setStatus(status) {
            statusBadge.className = 'px-2.5 py-1 rounded text-xs font-medium transition-colors whitespace-nowrap flex items-center gap-1';
            if (status === 'rendering') {
                statusBadge.innerHTML = '<span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span> 代码渲染中';
                statusBadge.classList.add('bg-yellow-50', 'text-yellow-700', 'border', 'border-yellow-200');
            } else if (status === 'ready') {
                statusBadge.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500"></span> 渲染就绪';
                statusBadge.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
            } else if (status === 'error') {
                statusBadge.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span> 渲染错误';
                statusBadge.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
            } else if (status === 'empty') {
                statusBadge.innerHTML = '<span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span> 等待输入';
                statusBadge.classList.add('bg-blue-50', 'text-blue-700', 'border', 'border-blue-200');
            }
        }

        function updatePreview() {
            const code = editor.getValue();
            
            // 【新手引导逻辑】：若无代码，则在右侧显示欢迎与操作引导
            if (!code.trim()) {
                setStatus('empty');
                const welcomeHTML = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="utf-8">
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <style>
                        body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #e5e5e5; font-family: system-ui, -apple-system, sans-serif; user-select: none; }
                        .welcome-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); text-align: center; max-width: 500px; width: 90%; margin-left: 450px; /* 避开左侧抽屉默认宽度 */ }
                        @media (max-width: 768px) { .welcome-card { margin-left: 0; } }
                        .step { background: #f8fafc; padding: 16px 20px; border-radius: 12px; margin: 12px 0; text-align: left; display: flex; align-items: center; gap: 16px; border: 1px solid #e2e8f0; transition: transform 0.2s; }
                        .step:hover { transform: translateX(5px); border-color: #cbd5e1; }
                        .step-icon { font-size: 28px; background: #fff; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
                    </style>
                </head>
                <body>
                    <div class="welcome-card">
                        <h1 class="text-2xl font-bold text-gray-800 mb-3">👋 欢迎使用 Canvas 长图自动化工具</h1>
                        <p class="text-gray-500 mb-8 text-sm">告别长图截断与模糊，三步实现高清输出</p>
                        
                        <div class="step">
                            <div class="step-icon">📋</div>
                            <div>
                                <div class="font-bold text-gray-700 text-sm">第一步：粘贴代码</div>
                                <div class="text-xs text-gray-500 mt-1">在左侧「代码面板」粘贴您的 React (JSX) 或纯 HTML 源码</div>
                            </div>
                        </div>
                        
                        <div class="step">
                            <div class="step-icon">👁️</div>
                            <div>
                                <div class="font-bold text-gray-700 text-sm">第二步：交互式预览</div>
                                <div class="text-xs text-gray-500 mt-1">右侧画板实时渲染，支持 <b>鼠标左键拖拽平移</b> 与 <b>滚轮缩放</b></div>
                            </div>
                        </div>
                        
                        <div class="step">
                            <div class="step-icon">📸</div>
                            <div>
                                <div class="font-bold text-gray-700 text-sm">第三步：一键生成</div>
                                <div class="text-xs text-gray-500 mt-1">点击顶部「生成截图」按钮，自动捕获 1:1 高清无损长图至本地</div>
                            </div>
                        </div>
                    </div>
                </body>
                </html>`;
                renderFrame.srcdoc = welcomeHTML;
                return;
            }

            setStatus('rendering');
            
            // 组装注入内容：应用原生 ESM + React + Babel 的超级沙箱，加入交互式画布控制
            const injectedHTML = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        /* 根节点彻底放权，允许内容无限扩张 */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100vw !important; 
            height: 100vh !important; 
            overflow: hidden !important; /* 隐藏原生滚动条，由画布接管 */
            background-color: #e5e5e5; 
            /* 禁止文本意外选中影响拖拽 */
            user-select: none;
            -webkit-user-select: none;
        }

        /* 无限画布视口 */
        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: grab;
        }
        #viewport:active {
            cursor: grabbing;
        }

        /* 变换舞台 (响应平移与缩放) */
        #canvas-stage {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            padding: 40px; /* 留出呼吸边缘 */
            box-sizing: border-box;
            display: inline-block; 
        }

        /* 截图包裹层：紧贴内容实际大小 */
        #capture-root {
            width: max-content;
            max-width: none;
            box-shadow: 0 20px 60px -15px rgba(0,0,0,0.1);
            background: #fff; 
            /* 恢复内容内部可选中(如果未来需要) */
            user-select: auto;
            -webkit-user-select: auto;
            cursor: auto;
        }
    </style>
    
    <!-- 引入 Tailwind CSS 處理樣式 -->
    <script src="https://cdn.tailwindcss.com"><\/script>
    <!-- 引入 html2canvas 負責截圖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script>
    <!-- 引入 Babel 實時編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>

    <!-- 【关键修复 1】：引入 es-module-shims 兼容包，解决平板/旧版浏览器不支持 importmap 导致完全无法渲染的致命问题 -->
    <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"><\/script>

    <!-- 【解決 React #31 錯誤的終極方案】：透過 Import Map 強制所有套件共用同一個 React 18.3.1 實例 -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
        "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0?external=react,react-dom"
      }
    }
    <\/script>
</head>
<body>
    <div id="viewport">
        <div id="canvas-stage">
            <div id="capture-root">
                <!-- React 組件將會渲染在這個節點 -->
                <div id="react-app-root"></div>
            </div>
        </div>
    </div>
    
    <!-- 画布控制、截圖與錯誤捕捉腳本 -->
    <script>
        // --- 拖拽与缩放逻辑引擎 ---
        const viewport = document.getElementById('viewport');
        /* 无限画布视口 */
        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: grab;
            /* 【关键修复 2】：禁用平板/手机浏览器原生的下拉刷新和边缘滑动，防止与画布拖拽冲突 */
            touch-action: none; 
        }
        #viewport:active {
            cursor: grabbing;
        }
    <!-- 画布控制、截圖與錯誤捕捉腳本 -->
    <script>
        // --- 拖拽与缩放逻辑引擎 ---
        const viewport = document.getElementById('viewport');
        const stage = document.getElementById('canvas-stage');
        const rootElement = document.getElementById('capture-root');

        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX, startY;

        function updateTransform() {
            stage.style.transform = 'translate(' + translateX + 'px, ' + translateY + 'px) scale(' + scale + ')';
        }

        // 滚轮缩放 (PC 端)
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.97 : 1.03; 
            
            const rect = viewport.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const prevScale = scale;
            scale *= delta;
            scale = Math.min(Math.max(0.05, scale), 5);

            translateX = mouseX - (mouseX - translateX) * (scale / prevScale);
            translateY = mouseY - (mouseY - translateY) * (scale / prevScale);

            updateTransform();
        }, { passive: false });

        // --- 鼠标拖拽 (PC 端) ---
        viewport.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; 
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('mouseleave', () => { isDragging = false; });

        // --- 【关键修复 3：新增平板/手机触屏拖拽支持】 ---
        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length !== 1) return; // 仅支持单指拖拽，避免多指冲突
            isDragging = true;
            startX = e.touches[0].clientX - translateX;
            startY = e.touches[0].clientY - translateY;
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging || e.touches.length !== 1) return;
            e.preventDefault(); // 阻止屏幕默认滚动
            translateX = e.touches[0].clientX - startX;
            translateY = e.touches[0].clientY - startY;
            updateTransform();
        }, { passive: false });

        window.addEventListener('touchend', () => { isDragging = false; });
        window.addEventListener('touchcancel', () => { isDragging = false; });

        // --- 核心截图通信 ---
        window.addEventListener('message', async function(event) {
            if (event.data === 'take-screenshot') {
                try {
                    await new Promise(resolve => setTimeout(resolve, 800)); 

                    // 截图前强制复原 Transform，确保 html2canvas 计算出 1:1 的原始物理尺寸
                    const oldTransform = stage.style.transform;
                    stage.style.transform = 'none';
                    
                    // 强制触发一次重绘，让浏览器重新排版
                    stage.getBoundingClientRect();
                    await new Promise(r => requestAnimationFrame(r));
                    await new Promise(r => requestAnimationFrame(r)); // 确保稳定

                    const captureWidth = rootElement.scrollWidth;
                    const captureHeight = Math.max(rootElement.scrollHeight, rootElement.offsetHeight);

                    html2canvas(rootElement, {
                        scrollY: -window.scrollY,
                        scrollX: -window.scrollX,
                        windowWidth: captureWidth,
                        windowHeight: captureHeight,
                        width: captureWidth,
                        height: captureHeight,
                        useCORS: true,
                        allowTaint: true,
                        backgroundColor: '#ffffff', 
                        scale: window.devicePixelRatio || 2,
                        logging: false
                    }).then(canvas => {
                        stage.style.transform = oldTransform; // 截图后无缝恢复原视角
                        const dataUrl = canvas.toDataURL('image/png', 1.0);
                        window.parent.postMessage({ type: 'capture-success', data: dataUrl }, '*');
                    }).catch(err => {
                        stage.style.transform = oldTransform;
                        window.parent.postMessage({ type: 'capture-error', error: err.message || err.toString() }, '*');
                    });
                } catch (e) {
                     stage.style.transform = oldTransform;
                     window.parent.postMessage({ type: 'capture-error', error: e.message }, '*');
                }
            }
        });

        window.addEventListener('error', function(event) {
            let msg = event.message || '未知腳本錯誤';
            if (msg === 'Script error.') {
                msg = '語法錯誤：import 語句必須位於代碼最頂部，或代碼中存在其他嚴重語法錯誤。';
            }
            window.parent.postMessage({ type: 'code-error', error: msg }, '*');

    <script type="text/babel" data-presets="react" data-type="module">

        // ============== 您的 React 代碼原封不動貼在這裡 ==============

            setTimeout(() => {

                // 自动缩小以适应屏幕宽度 (留白60px)
                if (stageRect.width > vpRect.width - 60) {
                    scale = (vpRect.width - 60) / stageRect.width;
                } else {
                    scale = 1;
                }
                
                translateX = (vpRect.width - stageRect.width * scale) / 2;
                translateY = Math.max((vpRect.height - stageRect.height * scale) / 2, 20);

        editor.session.on('change', function() {
            clearTimeout(renderTimeout);
            renderTimeout = setTimeout(updatePreview, 1000);
        });

        // 初始渲染检测
        updatePreview();

        // ==========================================
        // 3. 工具栏按钮交互 (加入空代码拦截逻辑)
        // ==========================================
        document.getElementById('btn-clear').addEventListener('click', () => {
            if(!editor.getValue().trim()) {
                alert('请先粘贴您的代码哦～');
                return;
            }
            if(confirm('确定要清空所有代码吗？')) {
                editor.setValue('', -1);
                if(codeDrawer.classList.contains('collapsed')) toggleDrawer(); // 清空时自动展开以便输入
                editor.focus();
            }
        });

        document.getElementById('btn-format').addEventListener('click', () => {
            if(!editor.getValue().trim()) {
                alert('请先粘贴您的代码哦～');
                return;
            }
            const val = editor.session.getValue();
            const formatted = val.replace(/></g, '>\n<'); 
            editor.session.setValue(formatted);
        });

        function getFilename() {
            const date = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            return `canvas-保单-${date.getFullYear()}${pad(date.getMonth()+1)}${pad(date.getDate())}-${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}.png`;
        }

        btnCapture.addEventListener('click', () => {
            if(!editor.getValue().trim()) {
                alert('请先粘贴您的代码哦～');
                return;
            }
            captureOverlay.classList.remove('hidden');
            // 如果抽屉开着，截图时可以暂时收起，体验更好
            if(!codeDrawer.classList.contains('collapsed')) {
                toggleDrawer();
            }
            renderFrame.contentWindow.postMessage('take-screenshot', '*');
        });

        // ==========================================
        // 4. iframe 通信结果处理
        // ==========================================
        window.addEventListener('message', function(event) {
            const msg = event.data;
            if (!msg || typeof msg !== 'object') return;

            if (msg.type === 'render-ready') {
                setStatus('ready');
            } 
            else if (msg.type === 'code-error') {
                setStatus('error');
                statusBadge.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span> 代碼報錯';
                statusBadge.title = "錯誤信息: " + msg.error; // 鼠標懸停查看詳細報錯
                console.error("沙箱內代碼運行錯誤:", msg.error);
            }
            else if (msg.type === 'capture-success') {
                captureOverlay.classList.add('hidden');
                
                const link = document.createElement('a');
                link.download = getFilename();
                link.href = msg.data;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                const originalHtml = btnCapture.innerHTML;
                btnCapture.innerHTML = '<i data-lucide="check-circle" class="w-4 h-4"></i> 保存成功';
                btnCapture.classList.replace('bg-blue-600', 'bg-green-600');
                btnCapture.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
                lucide.createIcons();

                setTimeout(() => {
                    btnCapture.innerHTML = originalHtml;
                    btnCapture.classList.replace('bg-green-600', 'bg-blue-600');
                    btnCapture.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
                    lucide.createIcons();
                }, 2500);
            } 
            else if (msg.type === 'capture-error') {
                captureOverlay.classList.add('hidden');
                setStatus('error');
                alert('截图生成失败：' + msg.error);
            }
        });
    </script>
