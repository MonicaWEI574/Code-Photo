<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas 长图自动化工具</title>
  
  <!-- 引入 Tailwind CSS 进行页面样式布局 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM 核心库 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel 使得浏览器能直接看懂和运行 JSX 语法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 引入截长图功能核心库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    /* 隐藏滚动条让代码面板更好看 */
    textarea::-webkit-scrollbar { width: 8px; height: 8px; }
    textarea::-webkit-scrollbar-track { background: transparent; }
    textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    textarea::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <!-- React 的挂载点 -->
  <div id="root"></div>

  <!-- 注意这里的 type="text/babel"，它是魔法生效的关键 -->
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // 纯手写 SVG 图标组件 (替代需要 import 的外部库，完美适应单文件部署)
    const Icon = ({ name, size = 16, className = "" }) => {
      const icons = {
        sidebar: <><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></>,
        move: <><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="19 9 22 12 19 15"/><polyline points="9 19 12 22 15 19"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="2"/></>,
        alignLeft: <><line x1="21" x2="3" y1="6" y2="6"/><line x1="15" x2="3" y1="12" y2="12"/><line x1="17" x2="3" y1="18" y2="18"/></>,
        trash: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
        camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
        x: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
        image: <><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></>,
        check: <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
        alert: <><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name]}
        </svg>
      );
    };

    const GUIDE_TEXT = `// 📌 操作全流程指引
// 
// 👋 欢迎！这是一个将前端代码一键转换为图片的自动化工具。
// 
// 1️⃣ 【粘贴代码】：请直接将您的 HTML/CSS/JS 代码粘贴到当前区域。
// 2️⃣ 【格式化代码】按钮：帮您快速整理杂乱的代码格式排版。
// 3️⃣ 【清空代码】按钮：一键重置当前编辑器，方便您开启下一次任务。
// 4️⃣ 【生成并保存到桌面】按钮：工具将自动渲染右侧预览，并截取长图保存到本地。
// 
// 💡 交互与隐私提示：
// - 右侧预览区会根据您粘贴的代码实时更新展示。
// - 未粘贴代码时点击按钮，系统会进行友好提示，防止误操作。
// - 当您开始输入或粘贴后，这段引导文字会自动消失，完全不影响您的代码执行。
// - 纯本地运行：本系统绝对不会硬编码或记录任何个人敏感数据，保护您的隐私。`;

    function App() {
      const [code, setCode] = useState('');
      const [toastMessage, setToastMessage] = useState(null);
      const [showCodePanel, setShowCodePanel] = useState(true);
      
      const iframeRef = useRef(null);
      const textareaRef = useRef(null);
      const gutterRef = useRef(null);

      const lineCount = Math.max(code.split('\n').length, 40);
      const lines = Array.from({ length: lineCount }, (_, i) => i + 1);

      const handleScroll = () => {
        if (gutterRef.current && textareaRef.current) {
          gutterRef.current.scrollTop = textareaRef.current.scrollTop;
        }
      };

      const showToast = (message, type = 'warning') => {
        setToastMessage({ message, type });
        setTimeout(() => setToastMessage(null), 3000);
      };

      const handleFormatCode = () => {
        if (!code.trim()) {
          showToast('请先粘贴您的代码哦～', 'warning');
          return;
        }
        const formatted = code.trim().replace(/>\s+</g, '>\n<');
        setCode(formatted);
        showToast('代码已初步格式化 ✨', 'success');
      };

      const handleClearCode = () => {
        if (!code.trim()) {
          showToast('请先粘贴您的代码哦～', 'warning');
          return;
        }
        setCode('');
        showToast('代码已清空', 'success');
      };

      const handleGenerateAndSave = async () => {
        if (!code.trim()) {
          showToast('请先粘贴您的代码哦～', 'warning');
          return;
        }

        try {
          const iframe = iframeRef.current;
          if (iframe && iframe.contentDocument && window.html2canvas) {
            showToast('正在生成截图，请稍候...', 'success');
            
            const canvas = await window.html2canvas(iframe.contentDocument.body, {
              useCORS: true,
              allowTaint: true,
              backgroundColor: '#ffffff'
            });
            
            const link = document.createElement('a');
            link.download = `canvas-screenshot-${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            showToast('✅ 截图已保存到桌面！', 'success');
          } else {
            throw new Error("html2canvas 未加载或无法访问 iframe 内容");
          }
        } catch (error) {
          console.error("截图失败:", error);
          const blob = new Blob([code], { type: 'text/html' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `canvas-code-${new Date().getTime()}.html`;
          link.click();
          URL.revokeObjectURL(url);
          showToast('⚠️ 截图因浏览器权限受限，已为您下载为网页文件', 'warning');
        }
      };

      return (
        <div className="min-h-screen bg-[#f3f4f6] flex flex-col font-sans relative overflow-hidden">
          <header className="bg-white border-b border-slate-200 h-14 flex items-center justify-between px-4 shadow-sm shrink-0 z-20">
            <div className="flex items-center gap-4">
              <button 
                onClick={() => setShowCodePanel(!showCodePanel)}
                className={`flex items-center gap-1.5 px-3 py-1.5 rounded text-sm font-medium transition-colors ${
                  showCodePanel 
                    ? 'bg-blue-50 text-blue-600 border border-blue-200' 
                    : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'
                }`}
              >
                <Icon name="sidebar" size={16} /> {showCodePanel ? '代码面板' : '展开代码'}
              </button>
              
              <div className="flex items-center gap-1.5">
                <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_4px_rgba(16,185,129,0.5)]"></div>
                <span className="text-slate-600 font-medium text-xs">渲染就绪</span>
              </div>
              
              <div className="hidden md:flex items-center gap-1.5 text-slate-400 text-xs ml-2 border-l border-slate-200 pl-4">
                <Icon name="move" size={14} /> 拖拽平移，滚轮缩放
              </div>
            </div>
            
            <div className="flex items-center gap-3">
              <button 
                onClick={handleFormatCode}
                className="flex items-center gap-1.5 px-2 py-1.5 text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors focus:outline-none"
              >
                <Icon name="alignLeft" size={16} /> 格式化
              </button>
              <button 
                onClick={handleClearCode}
                className="flex items-center gap-1.5 px-2 py-1.5 text-sm font-medium text-red-500 hover:text-red-600 transition-colors focus:outline-none"
              >
                <Icon name="trash" size={16} /> 清空
              </button>
              <button 
                onClick={handleGenerateAndSave}
                className="flex items-center gap-1.5 px-4 py-1.5 text-sm font-medium text-white bg-blue-600 rounded shadow-sm hover:bg-blue-700 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-200"
              >
                <Icon name="camera" size={16} /> 生成截图
              </button>
            </div>
          </header>

          <main className="flex-grow flex overflow-hidden relative">
            {showCodePanel && (
              <section className="w-full md:w-1/2 lg:w-[45%] flex flex-col bg-white border-r border-slate-200 shadow-xl z-10 shrink-0 absolute md:relative h-full left-0 top-0">
                <div className="flex items-center justify-between px-4 py-2.5 border-b border-slate-100 bg-slate-50/80">
                  <span className="text-xs font-semibold text-slate-500 tracking-wider">HTML / CSS / JS 输入区</span>
                  <button onClick={() => setShowCodePanel(false)} className="text-slate-400 hover:text-slate-600 transition-colors">
                    <Icon name="x" size={16} />
                  </button>
                </div>
                
                <div className="flex-grow relative bg-[#fafafa] flex overflow-hidden">
                  <div 
                    ref={gutterRef}
                    className="w-12 shrink-0 bg-slate-50 border-r border-slate-200 flex flex-col items-end py-4 pr-2 text-slate-400 font-mono text-[13px] leading-relaxed select-none overflow-hidden"
                  >
                    {lines.map(line => (
                      <div key={line}>{line}</div>
                    ))}
                  </div>
                  
                  <div className="flex-grow relative">
                    <textarea
                      ref={textareaRef}
                      value={code}
                      onChange={(e) => setCode(e.target.value)}
                      onScroll={handleScroll}
                      placeholder={GUIDE_TEXT}
                      className="absolute inset-0 w-full h-full p-4 font-mono text-[13px] leading-relaxed text-slate-800 bg-transparent resize-none focus:outline-none placeholder:text-slate-400 focus:bg-white transition-colors whitespace-pre"
                      spellCheck="false"
                      wrap="off"
                    />
                  </div>
                </div>
              </section>
            )}

            <section className="flex-grow flex items-center justify-center relative overflow-auto p-4 md:p-8 cursor-grab active:cursor-grabbing">
              {code.trim() ? (
                <div className="bg-white shadow-[0_8px_30px_rgb(0,0,0,0.12)] transition-all duration-300 w-full max-w-4xl h-[700px] rounded-md overflow-hidden flex flex-col">
                  <iframe
                    ref={iframeRef}
                    srcDoc={code}
                    title="Live Preview"
                    className="w-full h-full border-none"
                    sandbox="allow-scripts allow-same-origin"
                  />
                </div>
              ) : (
                <div className="flex flex-col items-center justify-center p-8 text-center max-w-lg">
                  <div className="w-16 h-16 bg-white text-slate-300 rounded-2xl flex items-center justify-center mb-6 shadow-sm border border-slate-100">
                     <Icon name="image" size={32} />
                  </div>
                  <h2 className="text-xl font-bold text-slate-700 mb-2">
                    预览区虚位以待
                  </h2>
                  <p className="text-slate-500 text-sm">
                    请在左侧代码面板粘贴您的代码，渲染就绪后这里将展示实时效果。
                  </p>
                </div>
              )}
            </section>
          </main>

          {toastMessage && (
            <div className="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 animate-in fade-in slide-in-from-top-4 duration-300">
              <div className={`flex items-center gap-2 px-5 py-3 rounded-full shadow-lg text-sm font-medium border ${
                toastMessage.type === 'success' 
                  ? 'bg-emerald-50 text-emerald-700 border-emerald-200' 
                  : 'bg-amber-50 text-amber-700 border-amber-200'
              }`}>
                {toastMessage.type === 'success' ? (
                  <Icon name="check" size={18} className="text-emerald-500" />
                ) : (
                  <Icon name="alert" size={18} className="text-amber-500" />
                )}
                {toastMessage.message}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
